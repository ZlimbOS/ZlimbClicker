<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb OS | Elite Edition</title>
    <style>
        :root { 
            --accent: #7B61FF; 
            --bg: #030408; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --danger: #FF4B4B;
        }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(at 15% 15%, rgba(123, 97, 255, 0.15) 0px, transparent 40%), radial-gradient(at 85% 85%, rgba(0, 209, 255, 0.1) 0px, transparent 40%); z-index: -1; filter: blur(60px); }

        /* Таймер */
        #session-timer { position: fixed; top: 30px; left: 30px; z-index: 999; background: var(--glass); border: 1px solid var(--border); padding: 10px 20px; border-radius: 15px; backdrop-filter: blur(20px); font-family: monospace; color: var(--accent); display: none; }

        /* Кнопка Профиля */
        #profile-trigger { position: fixed; top: 30px; right: 30px; z-index: 999; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px 22px; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        .glass-card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 40px; padding: 50px; text-align: center; width: 420px; z-index: 100; }
        h1 { font-size: 2.6rem; font-weight: 800; margin: 0 0 30px; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input { width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; display: block; margin-top: 10px; text-decoration: none; }

        /* Админ-панель (Боковое меню) */
        #side-menu { 
            position: fixed; top: 0; right: 0; height: 100vh; width: 400px; 
            background: rgba(8, 9, 13, 0.98); backdrop-filter: blur(60px); 
            border-left: 1px solid var(--border); z-index: 1000; 
            padding: 50px 40px; transition: 0.5s; transform: translateX(100%); 
            overflow-y: auto; box-sizing: border-box;
        }
        #side-menu.active { transform: translateX(0); }
        .admin-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
        .remove-btn { background: rgba(255,0,0,0.2); color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; border-radius: 8px; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="session-timer">До конца: <span id="time-val">24:00:00</span></div>

    <div id="profile-trigger" class="hidden" onclick="toggleMenu()">
        <span id="nav-user">User</span>
        <div style="width:10px; height:10px; background: #2ECC71; border-radius:50%;"></div>
    </div>

    <!-- ВХОД -->
    <div class="glass-card" id="screen-auth">
        <h1>Zlimb OS</h1>
        <input type="text" id="login-user" placeholder="Логин">
        <div id="pass-field" class="hidden"><input type="password" id="login-pass" placeholder="Пароль"></div>
        <div id="setup-pass-field" class="hidden">
            <p style="font-size: 0.8rem; color: var(--accent);">Установите пароль для доступа:</p>
            <input type="password" id="setup-new-pass" placeholder="Новый пароль">
        </div>
        <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
    </div>

    <!-- ЛАУНЧЕР -->
    <div class="glass-card hidden" id="screen-launcher">
        <h1>Zlimb Ultra</h1>
        <p style="color: rgba(255,255,255,0.4); margin-bottom: 40px;">Загрузка файла ZlimbClicker.exe...</p>
        <a href="https://dropbox.com" 
           id="auto-dl" target="_blank" class="btn">СКАЧАТЬ ВРУЧНУЮ</a>
    </div>

    <!-- АДМИНКА -->
    <div id="side-menu">
        <div style="background: var(--accent); padding: 4px 12px; border-radius: 8px; font-size: 0.7rem; display: inline-block;">OWNER</div>
        <h2 id="menu-name" style="font-size: 2rem; margin: 10px 0;">Username</h2>
        
        <div id="admin-section" class="hidden">
            <p style="color: var(--accent); font-weight: 800; margin-top: 40px;">АДМИН-ЦЕНТР</p>
            <p style="color: #555; font-size: 0.7rem;">ВЫДАТЬ ДОСТУП (WHITELIST)</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="target-nick" placeholder="Никнейм" style="margin:0; padding: 12px;">
                <button class="btn" style="margin:0; width: 80px;" onclick="addAdmin()">OK</button>
            </div>
            <div id="admin-list-box" style="margin-top: 20px;"></div>
        </div>

        <button class="btn" style="background:rgba(255,0,0,0.1); color:var(--danger); margin-top:50px;" onclick="logout()">ВЫЙТИ</button>
        <button class="btn" style="background: var(--glass); margin-top: 10px;" onclick="toggleMenu()">ЗАКРЫТЬ</button>
    </div>

    <script>
        const OWNER = 'zl1mbyys';
        const OWNER_P = 'Tema10052014!';

        // Проверка при вводе ника (для скрытия/показа полей пароля)
        document.getElementById('login-user').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            const whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            const isOwner = val.toLowerCase() === OWNER.toLowerCase();
            const inList = whitelist.includes(val);
            const hasPass = localStorage.getItem('z_pass_' + val);

            document.getElementById('pass-field').classList.toggle('hidden', !((isOwner) || (inList && hasPass)));
            document.getElementById('setup-pass-field').classList.toggle('hidden', !(inList && !hasPass));
        });

        function handleAuth() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            
            // Если владелец
            if (u.toLowerCase() === OWNER.toLowerCase() && p === OWNER_P) {
                initSession(u, 'OWNER');
            } 
            // Если новый юзер из вайтлиста ставит пароль
            else if (whitelist.includes(u) && !localStorage.getItem('z_pass_' + u)) {
                const newP = document.getElementById('setup-new-pass').value;
                if(newP.length < 4) return alert('Пароль слишком короткий');
                localStorage.setItem('z_pass_' + u, newP);
                initSession(u, 'USER');
            }
            // Если обычный юзер входит
            else if (whitelist.includes(u) && p === localStorage.getItem('z_pass_' + u)) {
                initSession(u, 'USER');
            } else {
                alert('Нет доступа или неверный пароль');
            }
        }

        function initSession(u, role) {
            localStorage.setItem('z_user', u);
            localStorage.setItem('z_role', role);
            if (!localStorage.getItem('z_timer_' + u)) {
                localStorage.setItem('z_timer_' + u, Date.now() + (24 * 60 * 60 * 1000));
            }
            location.reload();
        }

        window.onload = () => {
            const u = localStorage.getItem('z_user');
            if (u) {
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-launcher').classList.remove('hidden');
                document.getElementById('profile-trigger').classList.remove('hidden');
                document.getElementById('nav-user').innerText = u;
                document.getElementById('menu-name').innerText = u;
                
                if (u.toLowerCase() === OWNER) document.getElementById('admin-section').classList.remove('hidden');
                
                startTimer(u);
                renderWhitelist();
                // Автоскачивание
                setTimeout(() => document.getElementById('auto-dl').click(), 1500);
            }
        };

        function startTimer(u) {
            const box = document.getElementById('session-timer');
            box.style.display = 'block';
            setInterval(() => {
                const diff = parseInt(localStorage.getItem('z_timer_' + u)) - Date.now();
                if (diff <= 0) { logout(); return; }
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('time-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function addAdmin() {
            const nick = document.getElementById('target-nick').value.trim();
            if (!nick) return;
            let list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            if (!list.includes(nick)) list.push(nick);
            localStorage.setItem('z_whitelist', JSON.stringify(list));
            renderWhitelist();
        }

        function renderWhitelist() {
            const box = document.getElementById('admin-list-box');
            const list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            box.innerHTML = list.map(u => `
                <div class="admin-item">
                    <span>${u}</span>
                    <button class="remove-btn" onclick="removeUser('${u}')">УДАЛИТЬ</button>
                </div>
            `).join('');
        }

        function removeUser(u) {
            let list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            localStorage.setItem('z_whitelist', JSON.stringify(list.filter(i => i !== u)));
            localStorage.removeItem('z_pass_' + u);
            localStorage.removeItem('z_timer_' + u);
            renderWhitelist();
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function logout() { localStorage.removeItem('z_user'); location.reload(); }
    </script>
</body>
</html>
