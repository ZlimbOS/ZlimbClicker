<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb Launcher Pro</title>
    <style>
        @import url('https://googleapis.com');
        :root { --accent: #7B61FF; --bg: #0b0d14; --card-bg: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        #profile-trigger { position: fixed; top: 20px; right: 20px; z-index: 100; background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 10px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; border-bottom: 2px solid var(--accent); }
        #profile-trigger:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
        .card { background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px; text-align: center; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7); z-index: 10; width: 380px; position: relative; }
        #side-menu { position: fixed; top: 80px; right: 20px; width: 300px; background: rgba(15, 17, 26, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; z-index: 99; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateX(450px); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        #side-menu.active { transform: translateX(0); }
        h1 { font-size: 2rem; margin: 0 0 20px; background: linear-gradient(45deg, var(--accent), #00A2FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; outline: none; box-sizing: border-box; font-size: 0.9rem; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; display: block; margin-top: 10px; text-decoration: none; font-size: 1rem; text-align: center; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.15); font-size: 0.8rem; }
        .hidden { display: none; }
        .snowflake { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="particles-bg"></div>

    <!-- КНОПКА ПРОФИЛЯ -->
    <div id="profile-trigger" class="hidden" onclick="toggleMenu()">
        <span id="nav-username">User</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>

    <!-- ЭКРАН ВХОДА -->
    <div class="card" id="screen-auth">
        <h1>Zlimb Login</h1>
        <input type="text" id="login-user" placeholder="Ваш никнейм">
        <div id="pass-container" class="hidden">
            <input type="password" id="login-pass" placeholder="Пароль администратора">
        </div>
        <div id="setup-pass-container" class="hidden">
            <p style="font-size: 0.7rem; color: #7B61FF; margin-bottom: 5px;">Вам выдан доступ! Придумайте пароль:</p>
            <input type="password" id="setup-new-pass" placeholder="Новый пароль">
        </div>
        <button class="btn" onclick="handleAuth()">ПРОДОЛЖИТЬ</button>
    </div>

    <!-- ЭКРАН ЛАУНЧЕРА -->
    <div class="card hidden" id="screen-launcher">
        <h1>Zlimb OS</h1>
        <p style="color: #8F93A3; margin-bottom: 25px;">Система готова к работе.</p>
        <a href="https://yandex.ru" target="_blank" class="btn">СКАЧАТЬ ЛАУНЧЕР</a>
    </div>

    <!-- МЕНЮ ПРОФИЛЯ -->
    <div id="side-menu">
        <h2 id="menu-name" style="margin-top:0">Username</h2>
        <p id="menu-status" style="font-size:0.7rem; color: #7B61FF; letter-spacing:1px; margin-bottom:20px">USER</p>
        
        <div id="admin-panel" class="hidden">
            <p style="color: #FF4B4B; font-size: 0.8rem; font-weight: bold; border-top: 1px solid #222; padding-top: 15px;">АДМИН-ПАНЕЛЬ</p>
            <button class="btn btn-outline" onclick="setTheme('snow')">❄️ Снег</button>
            <button class="btn btn-outline" onclick="setTheme('matrix')">📟 Матрица</button>
            <button class="btn btn-outline" onclick="setTheme('fire')">🔥 Огонь</button>
        </div>
        <button class="btn" style="background:#222; margin-top:30px" onclick="logout()">ВЫЙТИ</button>
    </div>

    <script>
        // --- НАСТРОЙКИ ДОСТУПА ---
        const OWNER_NAME = 'zl1mbyys';
        const OWNER_PASS = 'Tema10052014!';

        // --- СПИСОК НИКОВ, КОМУ ВЫДАНА АДМИНКА ---
        const ADMIN_WHITELIST = ['ДРУГ1', 'БРО_НИК', 'GUEST123']; 

        let state = {
            user: localStorage.getItem('z_user'),
            isAdmin: localStorage.getItem('z_admin') === 'true',
            savedPass: localStorage.getItem('z_admin_pass'),
            theme: localStorage.getItem('z_theme') || 'snow'
        };

        // Логика динамических полей при вводе ника
        document.getElementById('login-user').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            const valLow = val.toLowerCase();
            const passBox = document.getElementById('pass-container');
            const setupBox = document.getElementById('setup-pass-container');

            // 1. Если владелец
            if(valLow === OWNER_NAME) {
                passBox.classList.remove('hidden');
                setupBox.classList.add('hidden');
            } 
            // 2. Если в вайтлисте, но пароль еще не создан
            else if(ADMIN_WHITELIST.includes(val) && !localStorage.getItem('z_pass_' + val)) {
                setupBox.classList.remove('hidden');
                passBox.classList.add('hidden');
            }
            // 3. Если в вайтлисте и пароль уже есть в памяти браузера
            else if(ADMIN_WHITELIST.includes(val) && localStorage.getItem('z_pass_' + val)) {
                passBox.classList.remove('hidden');
                setupBox.classList.add('hidden');
            }
            else {
                passBox.classList.add('hidden');
                setupBox.classList.add('hidden');
            }
        });

        function handleAuth() {
            const user = document.getElementById('login-user').value.trim();
            const passInput = document.getElementById('login-pass').value;
            const setupPass = document.getElementById('setup-new-pass').value;

            // Вход Владельца
            if(user.toLowerCase() === OWNER_NAME) {
                if(passInput === OWNER_PASS) saveLogin(user, true, OWNER_PASS);
                else alert("Неверный пароль владельца!");
            } 
            // Первый вход Админа из Вайтлиста (создание пароля)
            else if(ADMIN_WHITELIST.includes(user) && !localStorage.getItem('z_pass_' + user)) {
                if(setupPass.length >= 4) {
                    localStorage.setItem('z_pass_' + user, setupPass);
                    saveLogin(user, true, setupPass);
                } else alert("Придумайте пароль от 4 символов!");
            }
            // Обычный вход Админа по его паролю
            else if(ADMIN_WHITELIST.includes(user)) {
                const realPass = localStorage.getItem('z_pass_' + user);
                if(passInput === realPass) saveLogin(user, true, realPass);
                else alert("Неверный личный пароль админа!");
            }
            // Вход обычного пользователя
            else if(user.length > 1) {
                saveLogin(user, false, null);
            }
        }

        function saveLogin(user, admin, pass) {
            localStorage.setItem('z_user', user);
            localStorage.setItem('z_admin', admin);
            if(pass) localStorage.setItem('z_admin_pass', pass);
            location.reload();
        }

        function init() {
            if(!state.user) return;
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-launcher').classList.remove('hidden');
            document.getElementById('profile-trigger').classList.remove('hidden');
            document.getElementById('nav-username').innerText = state.user;
            document.getElementById('menu-name').innerText = state.user;

            if(state.isAdmin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('menu-status').innerText = "ADMINISTRATOR";
                document.getElementById('menu-status').style.color = "#FF4B4B";
            }
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function setTheme(t) { localStorage.setItem('z_theme', t); location.reload(); }
        function logout() { 
            // Сохраняем личные пароли, но выходим из сессии
            const user = localStorage.getItem('z_user');
            localStorage.removeItem('z_user');
            localStorage.removeItem('z_admin');
            localStorage.removeItem('z_admin_pass');
            location.reload(); 
        }

        function spawn() {
            const cont = document.getElementById('particles-bg');
            const p = document.createElement('div');
            p.classList.add('snowflake');
            let size = Math.random() * 4 + 2;
            p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.background = state.theme === 'matrix' ? "#00FF41" : (state.theme === 'fire' ? "orange" : "white");
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.top = '-10px';
            cont.appendChild(p);
            p.animate([{ transform: 'translateY(0)' }, { transform: `translateY(${window.innerHeight + 20}px)` }], { duration: Math.random() * 3000 + 2000 }).onfinish = () => p.remove();
        }
        setInterval(spawn, 100);
        init();
    </script>
</body>
</html>
