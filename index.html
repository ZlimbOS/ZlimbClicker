<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb OS | Elite Edition</title>
    <style>
        @import url('https://googleapis.com');
        :root { --accent: #7B61FF; --bg: #000000; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --danger: #FF4B4B; --success: #00FF88; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        #session-timer { position: fixed; top: 30px; left: 30px; z-index: 999; background: var(--glass); border: 1px solid var(--border); padding: 12px 20px; border-radius: 18px; backdrop-filter: blur(20px); font-family: monospace; color: var(--accent); display: none; }
        #profile-trigger { position: fixed; top: 30px; right: 30px; z-index: 999; background: var(--glass); border: 1px solid var(--border); border-radius: 22px; padding: 10px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 40px; padding: 50px; text-align: center; width: 420px; z-index: 100; box-shadow: 0 0 50px #000; }
        h1 { font-size: 2.5rem; font-weight: 800; margin: 0 0 30px; text-shadow: 0 0 20px var(--accent); }
        input { width: 100%; padding: 18px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; margin-bottom: 12px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; display: block; text-decoration: none; text-align: center; transition: 0.3s; }
        .btn-sec { background: transparent; border: 1px solid var(--border); margin-top: 10px; color: #555; font-size: 0.8rem; }

        #side-menu { position: fixed; top: 0; right: 0; height: 100vh; width: 420px; background: #050505; border-left: 1px solid var(--border); z-index: 1000; padding: 60px 40px; transition: 0.5s; transform: translateX(100%); overflow-y: auto; box-sizing: border-box; }
        #side-menu.active { transform: translateX(0); }
        
        .admin-item { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .admin-btns { display: flex; gap: 10px; margin-top: 15px; }
        .mini-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: none; color: #fff; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="session-timer">ОСТАЛОСЬ: <span id="time-val">24:00:00</span></div>

    <!-- КНОПКА ПРОФИЛЯ -->
    <div id="profile-trigger" class="hidden" onclick="toggleMenu()">
        <span id="nav-user">User</span>
        <div style="width:10px; height:10px; background: #2ECC71; border-radius:50%; box-shadow: 0 0 10px #2ECC71;"></div>
    </div>

    <!-- ВХОД -->
    <div class="glass-card" id="screen-auth">
        <h1>Zlimb OS</h1>
        <input type="text" id="login-user" placeholder="Логин">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
        <button class="btn btn-sec" onclick="switchForm('reg')">РЕГИСТРАЦИЯ</button>
    </div>

    <!-- РЕГИСТРАЦИЯ -->
    <div class="glass-card hidden" id="screen-reg">
        <h1>Регистрация</h1>
        <input type="text" id="reg-user" placeholder="Придумайте Логин">
        <input type="password" id="reg-pass" placeholder="Придумайте Пароль">
        <button class="btn" onclick="handleReg()">СОЗДАТЬ</button>
        <button class="btn btn-sec" onclick="switchForm('auth')">НАЗАД</button>
    </div>

    <!-- ЛАУНЧЕР -->
    <div class="glass-card hidden" id="screen-launcher">
        <h1>Elite Edition</h1>
        <p style="color: #333;">Файл скачивается автоматически...</p>
        <a href="https://dropbox.com" id="auto-dl" target="_blank" class="btn">СКАЧАТЬ ВРУЧНУЮ</a>
    </div>

    <!-- АДМИНКА -->
    <div id="side-menu">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <h2 id="menu-name" style="margin: 0; font-size: 2.2rem;">Username</h2>
            <button class="btn" style="width: auto; padding: 10px 15px; background: var(--glass);" onclick="toggleMenu()">ЗАКРЫТЬ</button>
        </div>
        
        <div id="admin-panel" class="hidden">
            <p style="color: var(--accent); font-weight: 800; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">АДМИН-ПАНЕЛЬ</p>
            <!-- КНОПКА ПОЛНОЙ ОЧИСТКИ -->
            <button class="btn" style="background: rgba(255,0,0,0.1); color: red; border: 1px solid red; margin-bottom: 20px;" onclick="clearAllData()">ОЧИСТИТЬ ВСЕХ ЮЗЕРОВ</button>
            <div id="user-list-render"></div>
        </div>

        <button class="btn" style="background:rgba(255,0,0,0.1); color:var(--danger); border: 1px solid rgba(255,0,0,0.1); margin-top:40px;" onclick="logout()">ВЫЙТИ</button>
    </div>

    <script>
        const OWNER = 'zl1mbyys';
        const OWNER_P = 'Tema10052014!';

        function clearAllData() {
            if(confirm("Вы уверены, что хотите удалить ВСЕХ пользователей?")) {
                localStorage.removeItem('z_db');
                renderUsers();
                alert("База данных очищена.");
            }
        }

        function switchForm(f) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-reg').classList.add('hidden');
            document.getElementById('screen-' + f).classList.remove('hidden');
        }

        function handleReg() {
            const u = document.getElementById('reg-user').value.trim().toLowerCase();
            const p = document.getElementById('reg-pass').value.trim();
            if(!u || !p) return;
            let db = JSON.parse(localStorage.getItem('z_db') || '{}');
            if(db[u] || u === OWNER) return alert('Этот ник уже занят!');
            db[u] = { pass: p, role: 'USER', time: Date.now() + 86400000 };
            localStorage.setItem('z_db', JSON.stringify(db));
            alert('Регистрация завершена! Теперь войдите.');
            switchForm('auth');
        }

        function handleAuth() {
            const u = document.getElementById('login-user').value.trim().toLowerCase();
            const p = document.getElementById('login-pass').value.trim();
            const db = JSON.parse(localStorage.getItem('z_db') || '{}');

            if (u === OWNER && p === OWNER_P) { login(u, 'OWNER'); }
            else if (db[u] && db[u].pass === p) { login(u, db[u].role); }
            else { alert('Неверные данные'); }
        }

        function login(u, role) {
            localStorage.setItem('z_cur', u);
            localStorage.setItem('z_role', role);
            if(u === OWNER && !localStorage.getItem('z_t_' + u)) localStorage.setItem('z_t_' + u, Date.now() + 86400000);
            location.reload();
        }

        window.onload = () => {
            initSnow(); drawSnow();
            const u = localStorage.getItem('z_cur');
            const r = localStorage.getItem('z_role');
            if (u) {
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-launcher').classList.remove('hidden');
                document.getElementById('profile-trigger').classList.remove('hidden');
                document.getElementById('nav-user').innerText = u;
                document.getElementById('menu-name').innerText = u;
                if (r === 'OWNER' || r === 'ADMIN') {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    renderUsers();
                }
                const db = JSON.parse(localStorage.getItem('z_db') || '{}');
                let end = (u === OWNER) ? localStorage.getItem('z_t_' + u) : db[u].time;
                startTimer(end);
                setTimeout(() => document.getElementById('auto-dl').click(), 1500);
            }
        };

        function renderUsers() {
            const box = document.getElementById('user-list-render');
            const db = JSON.parse(localStorage.getItem('z_db') || '{}');
            box.innerHTML = '';
            
            Object.keys(db).forEach(n => {
                const item = document.createElement('div');
                item.className = 'admin-item';
                item.innerHTML = `
                    <div style="font-size:0.6rem; color:var(--accent);">РОЛЬ: ${db.role}</div>
                    <div style="font-weight:800; font-size:1.2rem; margin:5px 0;">${n}</div>
                    <div class="admin-btns">
                        <button class="mini-btn" style="border-color:#00FF88; color:#00FF88;" onclick="setAdm('${n}')">ADMIN</button>
                        <button class="mini-btn" style="border-color:#FF4B4B; color:#FF4B4B;" onclick="delUser('${n}')">УДАЛИТЬ</button>
                    </div>
                `;
                box.appendChild(item);
            });
        }

        function setAdm(n) {
            let db = JSON.parse(localStorage.getItem('z_db') || '{}');
            if(db) db.role = 'ADMIN';
            localStorage.setItem('z_db', JSON.stringify(db));
            renderUsers();
        }

        function delUser(n) {
            let db = JSON.parse(localStorage.getItem('z_db') || '{}');
            if (db) {
                delete db;
                localStorage.setItem('z_db', JSON.stringify(db));
                renderUsers(); // Мгновенное обновление
            }
        }

        function startTimer(end) {
            document.getElementById('session-timer').style.display = 'block';
            setInterval(() => {
                const diff = end - Date.now();
                if(diff <= 0) logout();
                const h = Math.floor(diff/3600000).toString().padStart(2,'0'), m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0'), s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('time-val').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function logout() { localStorage.removeItem('z_cur'); localStorage.removeItem('z_role'); location.reload(); }
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d'); let snow = [];
        function initSnow() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; snow = Array.from({length: 80}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, s: Math.random()*1+0.5 })); }
        function drawSnow() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white"; snow.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); p.y += p.s; if(p.y > canvas.height) p.y = -10; }); requestAnimationFrame(drawSnow); }
        window.onresize = initSnow;
    </script>
</body>
</html>
