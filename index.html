<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb OS | Elite Edition</title>
    <style>
        :root { 
            --accent: #7B61FF; 
            --accent-glow: rgba(123, 97, 255, 0.4);
            --bg: #030408; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(at 15% 15%, rgba(123, 97, 255, 0.15) 0px, transparent 40%), radial-gradient(at 85% 85%, rgba(0, 209, 255, 0.1) 0px, transparent 40%); z-index: -1; filter: blur(60px); }

        /* Таймер в углу */
        #session-timer {
            position: fixed; top: 30px; left: 30px; z-index: 999;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 15px; backdrop-filter: blur(10px);
            font-family: monospace; font-size: 1.1rem; color: var(--accent);
            box-shadow: 0 0 20px rgba(0,0,0,0.5); display: none;
        }

        #profile-trigger { 
            position: fixed; top: 30px; right: 30px; z-index: 999; 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid var(--border); border-radius: 20px; 
            padding: 10px 22px; cursor: pointer; display: flex; 
            align-items: center; gap: 12px; transition: 0.3s; 
        }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid var(--border); border-radius: 40px; 
            padding: 50px; text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9); 
            z-index: 100; width: 420px; 
        }

        h1 { font-size: 2.6rem; font-weight: 800; margin: 0 0 30px; background: linear-gradient(135deg, #fff 40%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input { width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.4s; display: block; margin-top: 10px; text-decoration: none; font-size: 1rem; text-align: center; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--accent-glow); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <div id="session-timer">До конца: <span id="time-display">24:00:00</span></div>

    <div id="profile-trigger" class="hidden">
        <span id="nav-user" style="font-weight: 600;">Никнейм</span>
        <div style="width:10px; height:10px; background: #2ECC71; border-radius:50%;"></div>
    </div>

    <div class="glass-card" id="screen-auth">
        <h1>Zlimb OS</h1>
        <input type="text" id="login-user" placeholder="Логин">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
    </div>

    <div class="glass-card hidden" id="screen-launcher">
        <h1>Zlimb Ultra</h1>
        <p style="color: rgba(255,255,255,0.4); margin-bottom: 40px;">Загрузка начнется через секунду...</p>
        <a href="https://www.dropbox.com/scl/fi/fx2j877q2o9lt0j2sggkj/ZlimbClicker.exe?rlkey=9srnjzi32ci6bh5qupvc5vx9m&st=yf3k0y12&dl=1" 
           id="auto-download" class="btn" target="_blank">СКАЧАТЬ ВРУЧНУЮ</a>
    </div>

    <script>
        const OWNER = 'zl1mbyys';
        const OWNER_P = 'Tema10052014!';
        let timerInterval;

        // Проверка таймера при загрузке страницы
        window.onload = function() {
            if (localStorage.getItem('z_timer_end')) {
                startTimer();
            }
        };

        function handleAuth() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if (user === OWNER && pass === OWNER_P) {
                // Если таймер еще не запущен, ставим его на 24 часа
                if (!localStorage.getItem('z_timer_end')) {
                    const endTime = Date.now() + (24 * 60 * 60 * 1000);
                    localStorage.setItem('z_timer_end', endTime);
                }
                showLauncher(user);
                startTimer();
            } else {
                alert('Неверный логин или пароль');
            }
        }

        function startTimer() {
            const timerEl = document.getElementById('session-timer');
            const display = document.getElementById('time-display');
            timerEl.style.display = 'block';

            timerInterval = setInterval(() => {
                const now = Date.now();
                const end = parseInt(localStorage.getItem('z_timer_end'));
                const diff = end - now;

                if (diff <= 0) {
                    clearInterval(timerInterval);
                    localStorage.removeItem('z_timer_end');
                    timerEl.style.display = 'none';
                    return;
                }

                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                display.innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function showLauncher(username) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-launcher').classList.remove('hidden');
            document.getElementById('profile-trigger').classList.remove('hidden');
            document.getElementById('nav-user').innerText = username;

            // Автоматическое скачивание / переход по ссылке
            setTimeout(() => {
                const link = document.getElementById('auto-download');
                link.click();
            }, 1000);
        }
    </script>
</body>
</html>
