<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb OS | Elite Edition</title>
    <style>
        @import url('https://googleapis.com');
        
        :root { 
            --accent: #7B61FF; 
            --accent-glow: rgba(123, 97, 255, 0.4);
            --bg: #030408; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --danger: #FF4B4B;
        }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Живой фон */
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(at 15% 15%, rgba(123, 97, 255, 0.15) 0px, transparent 40%), radial-gradient(at 85% 85%, rgba(0, 209, 255, 0.1) 0px, transparent 40%); z-index: -1; filter: blur(60px); }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* Таймер в углу */
        #session-timer {
            position: fixed; top: 30px; left: 30px; z-index: 999;
            background: var(--glass); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 15px; backdrop-filter: blur(20px);
            font-family: monospace; font-size: 1.1rem; color: var(--accent);
            display: none;
        }

        /* Кнопка Профиля */
        #profile-trigger { 
            position: fixed; top: 30px; right: 30px; z-index: 999; 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid var(--border); border-radius: 20px; 
            padding: 10px 22px; cursor: pointer; display: flex; 
            align-items: center; gap: 12px; transition: 0.3s; 
        }
        #profile-trigger:hover { border-color: var(--accent); transform: scale(1.05); }

        /* Карточки */
        .glass-card { 
            background: var(--glass); backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid var(--border); border-radius: 40px; 
            padding: 50px; text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9); 
            z-index: 100; width: 420px; position: relative;
        }

        h1 { font-size: 2.6rem; font-weight: 800; margin: 0 0 30px; background: linear-gradient(135deg, #fff 40%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input { width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.4s; display: block; margin-top: 10px; text-decoration: none; font-size: 1rem; text-align: center; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--accent-glow); }

        /* Боковое меню */
        #side-menu { 
            position: fixed; top: 0; right: 0; height: 100vh; width: 350px; 
            background: rgba(8, 9, 13, 0.98); backdrop-filter: blur(60px); 
            border-left: 1px solid var(--border); z-index: 1000; 
            padding: 50px 40px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
            transform: translateX(100%); 
        }
        #side-menu.active { transform: translateX(0); }

        .snowflake { position: absolute; background: white; border-radius: 50%; pointer-events: none; opacity: 0.8; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="session-timer">До конца: <span id="time-display">24:00:00</span></div>

    <!-- КНОПКА ПРОФИЛЬ -->
    <div id="profile-trigger" class="hidden" onclick="toggleMenu()">
        <span id="nav-user" style="font-weight: 600;">Никнейм</span>
        <div style="width:10px; height:10px; background: #2ECC71; border-radius:50%; box-shadow: 0 0 10px #2ECC71;"></div>
    </div>

    <!-- ЭКРАН ВХОДА -->
    <div class="glass-card" id="screen-auth">
        <h1>Zlimb OS</h1>
        <input type="text" id="login-user" placeholder="Логин">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
    </div>

    <!-- ЭКРАН СКАЧИВАНИЯ -->
    <div class="glass-card hidden" id="screen-launcher">
        <h1>Zlimb Ultra</h1>
        <p style="color: rgba(255,255,255,0.4); margin-bottom: 40px;">Автоматическая загрузка запущена...</p>
        <a href="https://dropbox.com" 
           id="auto-download" class="btn" target="_blank">СКАЧАТЬ ВРУЧНУЮ</a>
    </div>

    <!-- БОКОВОЕ МЕНЮ -->
    <div id="side-menu">
        <h2 id="menu-name" style="margin: 0; font-size: 1.8rem;">Username</h2>
        <p style="color: var(--accent); font-size: 0.8rem; margin-bottom: 30px;">ELITE MEMBER</p>
        
        <p style="font-size: 0.7rem; color: #555; margin-bottom: 10px;">ЭФФЕКТЫ ФОНА</p>
        <button class="btn" style="background: var(--glass); font-size: 0.8rem;" onclick="setEffect('snow')">СНЕГ</button>
        <button class="btn" style="background: var(--glass); font-size: 0.8rem;" onclick="setEffect('matrix')">МАТРИЦА</button>
        
        <button class="btn" style="background:rgba(255,0,0,0.1); color:var(--danger); margin-top:40px;" onclick="logout()">ВЫЙТИ</button>
        <button class="btn" style="background: var(--glass); margin-top: 10px;" onclick="toggleMenu()">ЗАКРЫТЬ</button>
    </div>

    <script>
        const OWNER = 'zl1mbyys';
        const OWNER_P = 'Tema10052014!';
        let currentEffect = localStorage.getItem('z_effect') || 'snow';

        // Инициализация при загрузке
        window.onload = () => {
            if (localStorage.getItem('z_logged_in') === 'true') {
                showLauncher(OWNER);
                startTimer();
            }
            initBackground();
        };

        function handleAuth() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();

            if (u === OWNER && p === OWNER_P) {
                localStorage.setItem('z_logged_in', 'true');
                if (!localStorage.getItem('z_timer_end')) {
                    localStorage.setItem('z_timer_end', Date.now() + (24 * 60 * 60 * 1000));
                }
                showLauncher(u);
                startTimer();
            } else {
                alert('Ошибка доступа');
            }
        }

        function showLauncher(user) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-launcher').classList.remove('hidden');
            document.getElementById('profile-trigger').classList.remove('hidden');
            document.getElementById('nav-user').innerText = user;
            document.getElementById('menu-name').innerText = user;

            // Авто-скачивание
            setTimeout(() => {
                document.getElementById('auto-download').click();
            }, 1500);
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // --- ЛОГИКА ТАЙМЕРА ---
        function startTimer() {
            const timerBox = document.getElementById('session-timer');
            const display = document.getElementById('time-display');
            timerBox.style.display = 'block';

            setInterval(() => {
                const diff = parseInt(localStorage.getItem('z_timer_end')) - Date.now();
                if (diff <= 0) {
                    timerBox.style.display = 'none';
                    return;
                }
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                display.innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        // --- ЛОГИКА ФОНА (СНЕГ / МАТРИЦА) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initBackground() {
            window.addEventListener('resize', resize);
            resize();
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
        }

        function setEffect(type) {
            currentEffect = type;
            localStorage.setItem('z_effect', type);
            particles = [];
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (currentEffect === 'snow') {
                if (particles.length < 100) particles.push({ x: Math.random() * canvas.width, y: -10, r: Math.random() * 3 + 1, d: Math.random() * 1 + 0.5 });
                particles.forEach((p, i) => {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                    p.y += p.d; p.x += Math.sin(p.y/50);
                    if (p.y > canvas.height) particles.splice(i, 1);
                });
            } else if (currentEffect === 'matrix') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#7B61FF';
                ctx.font = '15px monospace';
                if (particles.length === 0) particles = Array(Math.floor(canvas.width/20)).fill(0);
                particles.forEach((y, x) => {
                    const text = String.fromCharCode(Math.random() * 128);
                    ctx.fillText(text, x * 20, y);
                    if (y > 100 + Math.random() * 10000) particles[x] = 0;
                    else particles[x] = y + 20;
                });
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
