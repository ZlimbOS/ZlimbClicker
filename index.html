<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb Launcher Pro</title>
    <style>
        @import url('https://googleapis.com');
        :root { --accent: #7B61FF; --bg: #0b0d14; --card-bg: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        #profile-trigger { position: fixed; top: 20px; right: 20px; z-index: 100; background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 10px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; border-bottom: 2px solid var(--accent); }
        #profile-trigger:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
        .card { background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px; text-align: center; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7); z-index: 10; width: 380px; position: relative; }
        #side-menu { position: fixed; top: 80px; right: 20px; width: 320px; max-height: 80vh; overflow-y: auto; background: rgba(15, 17, 26, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; z-index: 99; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateX(450px); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        #side-menu.active { transform: translateX(0); }
        h1 { font-size: 1.8rem; margin: 0 0 20px; background: linear-gradient(45deg, var(--accent), #00A2FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-size: 0.85rem; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 13px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; display: block; margin-top: 8px; text-decoration: none; font-size: 0.9rem; text-align: center; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.15); font-size: 0.8rem; }
        .btn-admin { background: #FF4B4B; }
        .hidden { display: none; }
        .snowflake { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
        .admin-list { text-align: left; font-size: 0.75rem; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #222; }
    </style>
</head>
<body>
    <div id="particles-bg"></div>

    <div id="profile-trigger" class="hidden" onclick="toggleMenu()">
        <span id="nav-username">User</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>

    <div class="card" id="screen-auth">
        <h1>Zlimb Login</h1>
        <input type="text" id="login-user" placeholder="Ваш никнейм">
        <div id="pass-field" class="hidden"><input type="password" id="login-pass" placeholder="Пароль владельца/админа"></div>
        <div id="setup-pass-box" class="hidden">
            <p style="font-size: 0.7rem; color: #7B61FF; margin-bottom: 5px;">Вам выдан доступ! Создайте пароль:</p>
            <input type="password" id="setup-new-pass" placeholder="Новый пароль">
        </div>
        <button class="btn" onclick="handleAuth()">ПРОДОЛЖИТЬ</button>
    </div>

    <div class="card hidden" id="screen-launcher">
        <h1>Zlimb OS</h1>
        <p style="color: #8F93A3; margin-bottom: 25px;">Система готова.</p>
        <a href="https://yandex.ru" target="_blank" class="btn">СКАЧАТЬ ЛАУНЧЕР</a>
    </div>

    <div id="side-menu">
        <h2 id="menu-name" style="margin-top:0; font-size: 1.2rem;">Username</h2>
        <p id="menu-status" style="font-size:0.65rem; color: #7B61FF; letter-spacing:1px; margin-bottom:15px">USER</p>
        
        <div id="admin-panel" class="hidden">
            <p style="color: #FF4B4B; font-size: 0.75rem; font-weight: bold; border-top: 1px solid #222; padding-top: 15px; margin-bottom: 10px;">АДМИН-ПАНЕЛЬ</p>
            <button class="btn btn-outline" onclick="setTheme('snow')">❄️ Снег</button>
            <button class="btn btn-outline" onclick="setTheme('matrix')">📟 Матрица</button>
            <button class="btn btn-outline" onclick="setTheme('fire')">🔥 Огонь</button>

            <!-- ТОЛЬКО ДЛЯ ВЛАДЕЛЬЦА -->
            <div id="owner-tools" class="hidden">
                <p style="color: #555; font-size: 0.65rem; margin-top:20px">ВЫДАЧА АДМИНКИ ПО НИКУ</p>
                <input type="text" id="target-nick" placeholder="Ник друга">
                <button class="btn btn-admin" style="font-size: 0.8rem;" onclick="addAdminByNick()">ВЫДАТЬ ДОСТУП</button>
                <div class="admin-list" id="admins-display">Список пуст</div>
            </div>
        </div>

        <button class="btn" style="background:#222; margin-top:25px" onclick="logout()">ВЫЙТИ</button>
    </div>

    <script>
        const OWNER_NAME = 'zl1mbyys';
        const OWNER_PASS = 'Tema10052014!';

        // Хардкод вайтлист (для всех)
        const HARDCODED_WHITELIST = ['ДРУГ1', 'TEMA_BRO'];

        let state = {
            user: localStorage.getItem('z_user'),
            isAdmin: localStorage.getItem('z_admin') === 'true',
            theme: localStorage.getItem('z_theme') || 'snow'
        };

        // Проверка при вводе ника
        document.getElementById('login-user').addEventListener('input', (e) => {
            const user = e.target.value.trim();
            const lowUser = user.toLowerCase();
            const localWhitelist = JSON.parse(localStorage.getItem('z_local_whitelist') || '[]');
            
            const isOwner = lowUser === OWNER_NAME;
            const inWhitelist = HARDCODED_WHITELIST.includes(user) || localWhitelist.includes(user);
            const hasPass = localStorage.getItem('z_pass_' + user);

            document.getElementById('pass-field').classList.toggle('hidden', !((isOwner) || (inWhitelist && hasPass)));
            document.getElementById('setup-pass-box').classList.toggle('hidden', !(inWhitelist && !hasPass));
        });

        function handleAuth() {
            const user = document.getElementById('login-user').value.trim();
            const passInput = document.getElementById('login-pass').value;
            const setupPass = document.getElementById('setup-new-pass').value;
            const localWhitelist = JSON.parse(localStorage.getItem('z_local_whitelist') || '[]');
            const inWhitelist = HARDCODED_WHITELIST.includes(user) || localWhitelist.includes(user);

            if(user.toLowerCase() === OWNER_NAME) {
                if(passInput === OWNER_PASS) saveLogin(user, true, OWNER_PASS);
                else alert("Ошибка пароля владельца");
            } 
            else if(inWhitelist) {
                const savedPass = localStorage.getItem('z_pass_' + user);
                if(!savedPass) {
                    if(setupPass.length > 3) {
                        localStorage.setItem('z_pass_' + user, setupPass);
                        saveLogin(user, true, setupPass);
                    } else alert("Пароль от 4 знаков!");
                } else {
                    if(passInput === savedPass) saveLogin(user, true, savedPass);
                    else alert("Неверный пароль админа");
                }
            } else if(user.length > 1) {
                saveLogin(user, false, null);
            }
        }

        function saveLogin(user, admin, pass) {
            localStorage.setItem('z_user', user);
            localStorage.setItem('z_admin', admin);
            if(pass) localStorage.setItem('z_admin_pass', pass);
            location.reload();
        }

        function addAdminByNick() {
            const nick = document.getElementById('target-nick').value.trim();
            if(!nick) return;
            let list = JSON.parse(localStorage.getItem('z_local_whitelist') || '[]');
            if(!list.includes(nick)) {
                list.push(nick);
                localStorage.setItem('z_local_whitelist', JSON.stringify(list));
                alert("Ник " + nick + " добавлен в список админов!");
                updateAdminDisplay();
            }
        }

        function updateAdminDisplay() {
            const list = JSON.parse(localStorage.getItem('z_local_whitelist') || '[]');
            document.getElementById('admins-display').innerText = list.length ? list.join(', ') : "Список пуст";
        }

        function init() {
            if(!state.user) return;
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-launcher').classList.remove('hidden');
            document.getElementById('profile-trigger').classList.remove('hidden');
            document.getElementById('nav-username').innerText = state.user;
            document.getElementById('menu-name').innerText = state.user;

            if(state.isAdmin || state.user.toLowerCase() === OWNER_NAME) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('menu-status').innerText = "ADMINISTRATOR";
                document.getElementById('menu-status').style.color = "#FF4B4B";
            }
            if(state.user.toLowerCase() === OWNER_NAME) {
                document.getElementById('owner-tools').classList.remove('hidden');
                updateAdminDisplay();
            }
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function setTheme(t) { localStorage.setItem('z_theme', t); location.reload(); }
        function logout() { 
            localStorage.removeItem('z_user');
            localStorage.removeItem('z_admin');
            localStorage.removeItem('z_admin_pass');
            location.reload(); 
        }

        function spawn() {
            const cont = document.getElementById('particles-bg');
            const p = document.createElement('div');
            p.classList.add('snowflake');
            let size = Math.random() * 4 + 2;
            p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.background = state.theme === 'matrix' ? "#00FF41" : (state.theme === 'fire' ? "orange" : "white");
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.top = '-10px';
            cont.appendChild(p);
            p.animate([{ transform: 'translateY(0)' }, { transform: `translateY(${window.innerHeight + 20}px)` }], { duration: Math.random() * 3000 + 2000 }).onfinish = () => p.remove();
        }
        setInterval(spawn, 100);
        init();
    </script>
</body>
</html>
