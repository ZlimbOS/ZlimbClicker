<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb OS | Elite Edition</title>
    <style>
        @import url('https://googleapis.com');
        
        :root { 
            --accent: #7B61FF; 
            --accent-glow: rgba(123, 97, 255, 0.4);
            --bg: #030408; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --danger: #FF4B4B;
        }

        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* Живой фон */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 15% 15%, rgba(123, 97, 255, 0.15) 0px, transparent 40%),
                radial-gradient(at 85% 85%, rgba(0, 209, 255, 0.1) 0px, transparent 40%);
            z-index: -1; filter: blur(60px);
        }

        #particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* Стеклянные карточки */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: 50px; text-align: center; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); 
            z-index: 10; width: 420px; 
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 { 
            font-size: 2.6rem; font-weight: 800; margin: 0 0 30px; 
            background: linear-gradient(135deg, #fff 40%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        input { 
            width: 100%; padding: 18px; margin-bottom: 12px; 
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); 
            border-radius: 16px; color: white; outline: none; box-sizing: border-box; 
            transition: 0.3s; font-size: 1rem;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .btn { 
            width: 100%; background: var(--accent); color: white; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; 
            transition: 0.4s; display: block; margin-top: 10px; text-decoration: none; font-size: 1rem;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--accent-glow); }

        /* Профиль */
        #profile-hub {
            position: fixed; top: 30px; right: 30px; z-index: 100;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 10px 22px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s;
        }

        /* Боковое меню */
        #side-menu {
            position: fixed; top: 0; right: 0; height: 100vh; width: 400px;
            background: rgba(8, 9, 13, 0.95); backdrop-filter: blur(60px);
            border-left: 1px solid var(--border); z-index: 150;
            padding: 50px 40px; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateX(100%);
        }
        #side-menu.active { transform: translateX(0); box-shadow: -40px 0 100px rgba(0,0,0,0.8); }

        /* Список админов */
        .admin-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 12px 18px; 
            border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border);
        }
        .remove-btn { 
            background: rgba(255,0,0,0.15); color: var(--danger); 
            border: 1px solid var(--danger); padding: 5px 12px; 
            border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 800;
        }

        .role-badge { 
            font-size: 0.65rem; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 1.5px; padding: 4px 10px; border-radius: 8px;
            margin-bottom: 10px; display: inline-block;
        }

        .hidden { display: none; }
        .snowflake { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="particles-bg"></div>

    <div id="profile-hub" class="hidden" onclick="toggleMenu()">
        <span id="nav-user" style="font-weight: 600;">Username</span>
        <div style="width:10px; height:10px; background: #2ECC71; border-radius:50%; box-shadow:0 0 10px #2ECC71;"></div>
    </div>

    <!-- ВХОД -->
    <div class="glass-card" id="screen-auth">
        <h1>Zlimb OS</h1>
        <input type="text" id="login-user" placeholder="Ваш ник">
        <div id="pass-field" class="hidden"><input type="password" id="login-pass" placeholder="Пароль"></div>
        <div id="setup-pass-field" class="hidden">
            <p style="font-size: 0.8rem; color: var(--accent); margin-bottom: 10px;">Вам выдан доступ. Установите пароль:</p>
            <input type="password" id="setup-new-pass" placeholder="Новый пароль">
        </div>
        <button class="btn" onclick="handleAuth()">Войти</button>
    </div>

    <!-- ЛАУНЧЕР -->
    <div class="glass-card hidden" id="screen-launcher">
        <h1>Zlimb Launcher</h1>
        <p style="color: rgba(255,255,255,0.4); margin-bottom: 40px; line-height: 1.6;">Пакет v1.0.6 Elite готов к загрузке в ваше окружение.</p>
        <a href="https://yandex.ru" target="_blank" class="btn">СКАЧАТЬ</a>
    </div>

    <!-- ПРОФИЛЬ / АДМИНКА -->
    <div id="side-menu">
        <div class="role-badge" id="menu-role-badge" style="background: rgba(123,97,255,0.1); color: var(--accent);">USER</div>
        <h2 id="menu-name" style="margin: 0; font-size: 2rem; font-weight: 800;">Username</h2>
        
        <div id="admin-section" class="hidden" style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px;">
            <p style="color: var(--accent); font-weight: 800; font-size: 0.8rem; margin-bottom: 20px;">УПРАВЛЕНИЕ СИСТЕМОЙ</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px;">
                <button class="btn" style="background: var(--glass); margin-top:0;" onclick="setTheme('snow')">Снег</button>
                <button class="btn" style="background: var(--glass); margin-top:0;" onclick="setTheme('matrix')">Матрица</button>
            </div>

            <!-- ТОЛЬКО ДЛЯ ВЛАДЕЛЬЦА -->
            <div id="owner-controls" class="hidden">
                <p style="color: #666; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px;">ВЫДАТЬ ПРАВА АДМИНИСТРАТОРА</p>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="target-nick" placeholder="Никнейм" style="margin-bottom:0;">
                    <button class="btn" style="margin-top:0; width: 100px;" onclick="addAdmin()">OK</button>
                </div>
                
                <p style="color: #666; font-size: 0.7rem; font-weight: 800; margin-top: 25px; margin-bottom: 15px;">СПИСОК АДМИНИСТРАТОРОВ</p>
                <div id="admin-list-container"></div>
            </div>
        </div>

        <button class="btn" style="background:rgba(255,0,0,0.1); color:var(--danger); margin-top:50px; border:1px solid rgba(255,0,0,0.2);" onclick="logout()">ВЫЙТИ</button>
        <button class="btn" style="background: var(--glass); margin-top: 15px;" onclick="toggleMenu()">ЗАКРЫТЬ</button>
    </div>

    <script>
        const OWNER = 'zl1mbyys';
        const OWNER_P = 'Tema10052014!';

        let state = {
            user: localStorage.getItem('z_user'),
            isAdmin: localStorage.getItem('z_admin') === 'true',
            theme: localStorage.getItem('z_theme') || 'snow'
        };

        document.getElementById('login-user').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            const whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            const isOwner = val.toLowerCase() === OWNER;
            const inList = whitelist.includes(val);
            const hasPass = localStorage.getItem('z_pass_' + val);
            document.getElementById('pass-field').classList.toggle('hidden', !((isOwner) || (inList && hasPass)));
            document.getElementById('setup-pass-field').classList.toggle('hidden', !(inList && !hasPass));
        });

        function handleAuth() {
            const nick = document.getElementById('login-user').value.trim();
            const passIn = document.getElementById('login-pass').value;
            const setupP = document.getElementById('setup-new-pass').value;
            const whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');

            if(nick.toLowerCase() === OWNER) {
                if(passIn === OWNER_P) save(nick, true);
                else alert("Неверный ключ Владельца");
            } else if(whitelist.includes(nick)) {
                const savedP = localStorage.getItem('z_pass_' + nick);
                if(!savedP) {
                    if(setupP.length > 3) { localStorage.setItem('z_pass_' + nick, setupP); save(nick, true); }
                    else alert("Минимум 4 символа");
                } else {
                    if(passIn === savedP) save(nick, true);
                    else alert("Ошибка доступа");
                }
            } else if(nick.length > 1) save(nick, false);
        }

        function save(u, a) {
            localStorage.setItem('z_user', u);
            localStorage.setItem('z_admin', a);
            location.reload();
        }

        function addAdmin() {
            const n = document.getElementById('target-nick').value.trim();
            if(!n) return;
            let list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            if(!list.includes(n)) {
                list.push(n);
                localStorage.setItem('z_whitelist', JSON.stringify(list));
                updateAdminList();
                document.getElementById('target-nick').value = '';
            }
        }

        function removeAdmin(nick) {
            let list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            list = list.filter(i => i !== nick);
            localStorage.setItem('z_whitelist', JSON.stringify(list));
            updateAdminList();
        }

        function updateAdminList() {
            const container = document.getElementById('admin-list-container');
            const list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            container.innerHTML = list.length ? '' : '<p style="color:#444; font-size:0.8rem;">Список пуст</p>';
            list.forEach(nick => {
                const div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `<span>${nick}</span><button class="remove-btn" onclick="removeAdmin('${nick}')">УДАЛИТЬ</button>`;
                container.appendChild(div);
            });
        }

        function init() {
            if(!state.user) return;
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-launcher').classList.remove('hidden');
            document.getElementById('profile-hub').classList.remove('hidden');
            document.getElementById('nav-user').innerText = state.user;
            document.getElementById('menu-name').innerText = state.user;

            const badge = document.getElementById('menu-role-badge');
            if(state.user.toLowerCase() === OWNER) {
                badge.innerText = "ВЛАДЕЛЕЦ";
                badge.style.background = "rgba(255,75,75,0.15)";
                badge.style.color = "#FF4B4B";
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('owner-controls').classList.remove('hidden');
                updateAdminList();
            } else if(state.isAdmin) {
                badge.innerText = "АДМИНИСТРАТОР";
                badge.style.background = "rgba(123,97,255,0.15)";
                badge.style.color = "#7B61FF";
                document.getElementById('admin-section').classList.remove('hidden');
            }
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function setTheme(t) { localStorage.setItem('z_theme', t); location.reload(); }
        function logout() { localStorage.removeItem('z_user'); localStorage.removeItem('z_admin'); location.reload(); }

        function spawn() {
            const cont = document.getElementById('particles-bg');
            const p = document.createElement('div');
            p.classList.add('snowflake');
            let size = Math.random() * 3 + 1;
            p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.background = state.theme === 'matrix' ? "#00FF41" : "rgba(255,255,255,0.4)";
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.top = '-10px';
            cont.appendChild(p);
            p.animate([{ transform: 'translateY(0)' }, { transform: `translateY(${window.innerHeight + 20}px)` }], { duration: Math.random() * 4000 + 3000 }).onfinish = () => p.remove();
        }
        setInterval(spawn, 150);
        init();
    </script>
</body>
</html>
