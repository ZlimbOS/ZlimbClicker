<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb OS | Elite Edition</title>
    <style>
        @import url('https://googleapis.com');
        
        :root { 
            --accent: #7B61FF; 
            --accent-glow: rgba(123, 97, 255, 0.4);
            --bg: #030408; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --danger: #FF4B4B;
        }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(at 15% 15%, rgba(123, 97, 255, 0.15) 0px, transparent 40%), radial-gradient(at 85% 85%, rgba(0, 209, 255, 0.1) 0px, transparent 40%); z-index: -1; filter: blur(60px); }
        #particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* Таймер 24 часа */
        #session-timer {
            position: fixed; top: 30px; left: 30px; z-index: 200;
            background: var(--glass); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 15px; backdrop-filter: blur(20px);
            font-family: monospace; font-size: 1rem; color: var(--accent); display: none;
        }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid var(--border); border-radius: 40px; 
            padding: 50px; text-align: center; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9); 
            z-index: 10; width: 420px; 
        }

        h1 { font-size: 2.6rem; font-weight: 800; margin: 0 0 30px; background: linear-gradient(135deg, #fff 40%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; box-sizing: border-box; font-size: 1rem; }

        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.4s; display: block; margin-top: 10px; text-decoration: none; font-size: 1rem; text-align: center; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--accent-glow); filter: brightness(1.1); }

        #profile-trigger { position: fixed; top: 30px; right: 30px; z-index: 100; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px 22px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }

        #side-menu { 
            position: fixed; top: 0; right: 0; height: 100vh; width: 380px; 
            background: rgba(8, 9, 13, 0.95); backdrop-filter: blur(60px); 
            border-left: 1px solid var(--border); z-index: 150; 
            padding: 50px 40px; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            transform: translateX(100%); overflow-y: auto; box-sizing: border-box;
        }
        #side-menu.active { transform: translateX(0); }

        .role-badge { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; padding: 4px 12px; border-radius: 8px; margin-bottom: 10px; display: inline-block; background: var(--accent); }
        .hidden { display: none !important; }
        .snowflake { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="particles-bg"></div>
    <div id="session-timer">Осталось: <span id="time-val">24:00:00</span></div>

    <!-- ПРОФИЛЬ -->
    <div id="profile-trigger" class="hidden" onclick="toggleMenu()">
        <span id="nav-user">Username</span>
        <div style="width:10px; height:10px; background: #2ECC71; border-radius:50%; box-shadow:0 0 10px #2ECC71;"></div>
    </div>

    <!-- ВХОД -->
    <div class="glass-card" id="screen-auth">
        <h1>Zlimb OS</h1>
        <input type="text" id="login-user" placeholder="Логин">
        <div id="pass-field" class="hidden"><input type="password" id="login-pass" placeholder="Пароль"></div>
        <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
    </div>

    <!-- ЛАУНЧЕР -->
    <div class="glass-card hidden" id="screen-launcher">
        <h1>Zlimb Ultra</h1>
        <p style="color: rgba(255,255,255,0.4); margin-bottom: 40px;">Загрузка ZlimbClicker.exe...</p>
        <a href="https://dropbox.com" 
           id="auto-dl-link" target="_blank" class="btn">СКАЧАТЬ ВРУЧНУЮ</a>
    </div>

    <!-- МЕНЮ -->
    <div id="side-menu">
        <div class="role-badge" id="menu-role-badge">USER</div>
        <h2 id="menu-name">Username</h2>
        
        <div id="admin-section" class="hidden" style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px;">
            <p style="color: var(--accent); font-weight: 800; font-size: 0.8rem; margin-bottom: 20px;">АДМИН-ЦЕНТР</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px;">
                <button class="btn" style="background: var(--glass); margin:0;" onclick="setTheme('snow')">СНЕГ</button>
                <button class="btn" style="background: var(--glass); margin:0;" onclick="setTheme('matrix')">МАТРИЦА</button>
            </div>
        </div>

        <button class="btn" style="background:rgba(255,0,0,0.1); color:var(--danger); margin-top:50px;" onclick="logout()">ВЫЙТИ</button>
        <button class="btn" style="background: var(--glass); margin-top: 15px;" onclick="toggleMenu()">ЗАКРЫТЬ</button>
    </div>

    <script>
        const OWNER = 'zl1mbyys';
        const OWNER_P = 'Tema10052014!';

        // При загрузке восстанавливаем сессию
        window.onload = () => {
            const savedUser = localStorage.getItem('z_user');
            if (savedUser) {
                showLauncher(savedUser);
                startTimer();
            }
            applyTheme();
        };

        // Твоя логика проверки ника для появления поля пароля
        document.getElementById('login-user').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (val.toLowerCase() === OWNER.toLowerCase()) {
                document.getElementById('pass-field').classList.remove('hidden');
            }
        });

        function handleAuth() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if (user.toLowerCase() === OWNER.toLowerCase() && pass === OWNER_P) {
                localStorage.setItem('z_user', user);
                localStorage.setItem('z_admin', 'true');
                
                // Ставим таймер на 24 часа, если его нет
                if (!localStorage.getItem('z_timer_end')) {
                    localStorage.setItem('z_timer_end', Date.now() + (24 * 60 * 60 * 1000));
                }

                showLauncher(user);
                startTimer();
            } else {
                alert('Ошибка доступа');
            }
        }

        function showLauncher(user) {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-launcher').classList.remove('hidden');
            document.getElementById('profile-trigger').classList.remove('hidden');
            document.getElementById('nav-user').innerText = user;
            document.getElementById('menu-name').innerText = user;

            if (user.toLowerCase() === OWNER) {
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('menu-role-badge').innerText = 'OWNER';
            }

            // АВТО-СКАЧИВАНИЕ
            setTimeout(() => {
                document.getElementById('auto-dl-link').click();
            }, 1500);
        }

        function startTimer() {
            const timerBox = document.getElementById('session-timer');
            const display = document.getElementById('time-val');
            timerBox.style.display = 'block';

            setInterval(() => {
                const end = parseInt(localStorage.getItem('z_timer_end'));
                const diff = end - Date.now();

                if (diff <= 0) {
                    timerBox.style.display = 'none';
                    localStorage.removeItem('z_timer_end');
                    return;
                }

                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                display.innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // Темы
        function setTheme(t) {
            localStorage.setItem('z_theme', t);
            location.reload();
        }

        function applyTheme() {
            const theme = localStorage.getItem('z_theme') || 'snow';
            if (theme === 'snow') { /* Тут логика снежинок из твоего старого кода */ }
        }
    </script>
</body>
</html>
