<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb OS | Next Gen Launcher</title>
    <style>
        @import url('https://googleapis.com');
        
        :root { 
            --accent: #7B61FF; 
            --accent-glow: rgba(123, 97, 255, 0.5);
            --bg: #050608; 
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* Анимированный фоновый градиент */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1033 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #0d1a33 0%, transparent 40%);
            z-index: -1; filter: blur(80px); opacity: 0.6;
        }

        #particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* Стиль кнопок и полей */
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(30px) saturate(180%); 
            border: 1px solid var(--border); 
            border-radius: 32px; 
            padding: 50px 40px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); 
            z-index: 10; width: 400px; 
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            font-size: 2.4rem; font-weight: 800; margin: 0 0 30px; 
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        input { 
            width: 100%; padding: 18px; margin-bottom: 15px; 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--border); 
            border-radius: 16px; color: white; 
            outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 15px var(--accent-glow); }

        .btn { 
            width: 100%; background: var(--accent); color: white; 
            border: none; padding: 18px; border-radius: 16px; 
            font-weight: 600; cursor: pointer; transition: 0.4s; 
            display: block; margin-top: 15px; text-decoration: none; 
            font-size: 1.1rem; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 30px var(--accent-glow); filter: brightness(1.1); }

        /* Профиль в углу */
        #profile-trigger {
            position: fixed; top: 30px; right: 30px; z-index: 100;
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            transition: 0.3s;
        }
        #profile-trigger:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

        /* Выезжающее меню */
        #side-menu {
            position: fixed; top: 100px; right: 30px; width: 340px;
            background: rgba(10, 11, 15, 0.95); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 30px; z-index: 99; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateX(450px);
        }
        #side-menu.active { transform: translateX(0); box-shadow: -20px 20px 60px rgba(0,0,0,0.5); }

        .hidden { display: none; }
        .snowflake { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
        .admin-section { border-top: 1px solid var(--border); margin-top: 25px; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div id="particles-bg"></div>

    <div id="profile-trigger" class="hidden" onclick="toggleMenu()">
        <span id="nav-username" style="font-weight: 600;">User</span>
        <div style="width:32px; height:32px; background: var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </div>

    <div class="card" id="screen-auth">
        <h1>Zlimb OS</h1>
        <input type="text" id="login-user" placeholder="Имя пользователя">
        <div id="pass-container" class="hidden"><input type="password" id="login-pass" placeholder="Ключ доступа"></div>
        <div id="setup-pass-container" class="hidden">
            <p style="font-size: 0.8rem; color: var(--accent); margin-bottom: 10px;">Доступ подтвержден. Создайте пароль:</p>
            <input type="password" id="setup-new-pass" placeholder="Новый пароль">
        </div>
        <button class="btn" onclick="handleAuth()">Войти в систему</button>
    </div>

    <div class="card hidden" id="screen-launcher">
        <h1 style="font-size: 1.8rem;">Добро пожаловать</h1>
        <p style="color: rgba(255,255,255,0.5); margin-bottom: 40px; font-weight: 300;">Ваше персональное рабочее пространство Zlimb готово к использованию.</p>
        <a href="https://yandex.ru" target="_blank" class="btn">Запустить Launcher</a>
    </div>

    <div id="side-menu">
        <h2 id="menu-name" style="margin: 0; font-size: 1.4rem;">Username</h2>
        <span id="menu-status" style="font-size:0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px;">Стандартный доступ</span>
        
        <div id="admin-panel" class="hidden admin-section">
            <p style="color: #FF4B4B; font-size: 0.8rem; font-weight: 700; margin-bottom: 15px;">ПАНЕЛЬ УПРАВЛЕНИЯ</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn" style="background:rgba(255,255,255,0.05); font-size:0.8rem;" onclick="setTheme('snow')">Снег</button>
                <button class="btn" style="background:rgba(255,255,255,0.05); font-size:0.8rem;" onclick="setTheme('matrix')">Матрица</button>
            </div>

            <div id="owner-only" class="hidden" style="margin-top: 20px;">
                <input type="text" id="target-username" placeholder="Ник пользователя" style="padding: 12px; font-size: 0.8rem;">
                <button class="btn" style="background:#FF4B4B; padding: 12px; font-size: 0.8rem;" onclick="giveAdmin()">Выдать админку</button>
            </div>
        </div>

        <button class="btn" style="background:rgba(255,0,0,0.1); color:#FF4B4B; margin-top:40px; border: 1px solid rgba(255,0,0,0.2);" onclick="logout()">Завершить сеанс</button>
    </div>

    <script>
        const OWNER_NAME = 'zl1mbyys';
        const OWNER_PASS = 'Tema10052014!';

        let state = {
            user: localStorage.getItem('z_user'),
            isAdmin: localStorage.getItem('z_admin') === 'true',
            theme: localStorage.getItem('z_theme') || 'snow'
        };

        document.getElementById('login-user').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            const whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            const isOwner = val.toLowerCase() === OWNER_NAME;
            const inWhitelist = whitelist.includes(val);
            const hasPass = localStorage.getItem('z_pass_' + val);

            document.getElementById('pass-container').classList.toggle('hidden', !((isOwner) || (inWhitelist && hasPass)));
            document.getElementById('setup-pass-container').classList.toggle('hidden', !(inWhitelist && !hasPass));
        });

        function handleAuth() {
            const user = document.getElementById('login-user').value.trim();
            const passInput = document.getElementById('login-pass').value;
            const setupPass = document.getElementById('setup-new-pass').value;
            const whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');

            if(user.toLowerCase() === OWNER_NAME) {
                if(passInput === OWNER_PASS) saveLogin(user, true);
                else alert("Неверный ключ владельца");
            } 
            else if(whitelist.includes(user)) {
                const savedPass = localStorage.getItem('z_pass_' + user);
                if(!savedPass) {
                    if(setupPass.length > 3) { localStorage.setItem('z_pass_' + user, setupPass); saveLogin(user, true); }
                    else alert("Минимум 4 символа");
                } else {
                    if(passInput === savedPass) saveLogin(user, true);
                    else alert("Неверный ключ админа");
                }
            } else if(user.length > 1) saveLogin(user, false);
        }

        function saveLogin(user, admin) {
            localStorage.setItem('z_user', user);
            localStorage.setItem('z_admin', admin);
            location.reload();
        }

        function giveAdmin() {
            const nick = document.getElementById('target-username').value.trim();
            if(!nick) return;
            let whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            if(!whitelist.includes(nick)) {
                whitelist.push(nick);
                localStorage.setItem('z_whitelist', JSON.stringify(whitelist));
                alert("Доступ для " + nick + " открыт");
            }
        }

        function init() {
            if(!state.user) return;
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-launcher').classList.remove('hidden');
            document.getElementById('profile-trigger').classList.remove('hidden');
            document.getElementById('nav-username').innerText = state.user;
            document.getElementById('menu-name').innerText = state.user;

            if(state.isAdmin || state.user.toLowerCase() === OWNER_NAME) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('menu-status').innerText = "Administrator Access";
            }
            if(state.user.toLowerCase() === OWNER_NAME) document.getElementById('owner-only').classList.remove('hidden');
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function setTheme(t) { localStorage.setItem('z_theme', t); location.reload(); }
        function logout() { localStorage.removeItem('z_user'); localStorage.removeItem('z_admin'); location.reload(); }

        function spawn() {
            const cont = document.getElementById('particles-bg');
            const p = document.createElement('div');
            p.classList.add('snowflake');
            let size = Math.random() * 3 + 1;
            p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.background = state.theme === 'matrix' ? "#00FF41" : "white";
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.top = '-10px';
            cont.appendChild(p);
            p.animate([{ transform: 'translateY(0)' }, { transform: `translateY(${window.innerHeight + 20}px)` }], { duration: Math.random() * 4000 + 3000 }).onfinish = () => p.remove();
        }
        setInterval(spawn, 150);
        init();
    </script>
</body>
</html>
