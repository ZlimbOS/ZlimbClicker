<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb OS | Elite Edition</title>
    <style>
        @import url('https://googleapis.com');
        
        :root { 
            --accent: #7B61FF; 
            --accent-glow: rgba(123, 97, 255, 0.4);
            --bg: #030408; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --danger: #FF4B4B;
        }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Живой фон с переливами */
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(at 15% 15%, rgba(123, 97, 255, 0.15) 0px, transparent 45%), radial-gradient(at 85% 85%, rgba(0, 209, 255, 0.12) 0px, transparent 45%); z-index: -1; filter: blur(60px); animation: bgMove 20s infinite alternate; }
        @keyframes bgMove { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        #particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* Главная стеклянная карта */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: 60px 45px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8); 
            z-index: 10; width: 420px; 
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn { from { opacity: 0; transform: scale(0.9) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        h1 { font-size: 2.8rem; font-weight: 800; margin: 0 0 35px; letter-spacing: -2px; background: linear-gradient(135deg, #fff 40%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input { width: 100%; padding: 18px; margin-bottom: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 16px; color: white; outline: none; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .btn-main { width: 100%; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 18px; font-weight: 700; cursor: pointer; transition: 0.4s; display: block; margin-top: 15px; text-decoration: none; font-size: 1.1rem; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-main:hover { transform: translateY(-4px); box-shadow: 0 15px 30px var(--accent-glow); filter: brightness(1.1); }

        /* Профиль в углу */
        #profile-trigger { position: fixed; top: 30px; right: 30px; z-index: 100; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 10px 22px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        #profile-trigger:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }

        /* Боковое меню */
        #side-menu { position: fixed; top: 0; right: 0; height: 100vh; width: 380px; background: rgba(8, 9, 13, 0.95); backdrop-filter: blur(60px); border-left: 1px solid var(--border); z-index: 150; padding: 50px 40px; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); transform: translateX(100%); overflow-y: auto; box-sizing: border-box; }
        #side-menu.active { transform: translateX(0); box-shadow: -40px 0 100px rgba(0,0,0,0.9); }

        .role-badge { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; padding: 5px 12px; border-radius: 10px; margin-bottom: 15px; display: inline-block; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); font-size: 0.9rem; }
        .remove-btn { background: rgba(255,0,0,0.2); color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; transition: 0.3s; }
        .remove-btn:hover { background: var(--danger); color: white; }

        .hidden { display: none; }
        .snowflake { position: absolute; background: white; border-radius: 50%; pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="particles-bg"></div>

    <!-- ИНДИКАТОР ПРОФИЛЯ -->
    <div id="profile-trigger" class="hidden" onclick="toggleMenu()">
        <span id="nav-user" style="font-weight: 600; font-size: 0.9rem;">Загрузка...</span>
        <div style="width:34px; height:34px; background: var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 15px var(--accent-glow);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </div>

    <!-- ФОРМА ВХОДА -->
    <div class="glass-card" id="screen-auth">
        <h1>Zlimb OS</h1>
        <input type="text" id="login-user" placeholder="Логин">
        <div id="pass-field" class="hidden"><input type="password" id="login-pass" placeholder="Пароль владельца/админа"></div>
        <div id="setup-pass-field" class="hidden">
            <p style="font-size: 0.8rem; color: #00D1FF; margin-bottom: 10px;">Вам выдан доступ. Создайте пароль:</p>
            <input type="password" id="setup-new-pass" placeholder="Новый пароль">
        </div>
        <button class="btn-main" onclick="handleAuth()">Войти в систему</button>
    </div>

    <!-- ЭКРАН СКАЧИВАНИЯ -->
    <div class="glass-card hidden" id="screen-launcher">
        <h1>Zlimb Ultra</h1>
        <p style="color: rgba(255,255,255,0.4); margin-bottom: 40px; line-height: 1.6; font-weight: 300;">Версия v1.0.6 Elite готова.<br>Нажмите кнопку ниже для мгновенной установки.</p>
        
        <!-- ССЫЛКА НА ФАЙЛ В РЕПОЗИТОРИИ (БЕЗ ЯНДЕКСА И ДРОПБОКСА) -->
        <a href="ZlimbClicker.exe" download class="btn-main">УСТАНОВИТЬ СЕЙЧАС</a>
        <p style="font-size: 0.7rem; color: #444; margin-top: 15px;">*Прямая загрузка через GitHub SSL</p>
    </div>

    <!-- МЕНЮ ПРОФИЛЯ -->
    <div id="side-menu">
        <div class="role-badge" id="menu-role-badge">USER</div>
        <h2 id="menu-name" style="margin: 0; font-size: 1.8rem; font-weight: 800;">Username</h2>
        
        <div id="admin-section" class="hidden" style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px;">
            <p style="color: var(--accent); font-weight: 800; font-size: 0.8rem; margin-bottom: 20px;">ПАНЕЛЬ УПРАВЛЕНИЯ</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px;">
                <button class="btn-main" style="background: rgba(255,255,255,0.05); font-size: 0.8rem; padding: 12px;" onclick="setTheme('snow')">Эффект: Снег</button>
                <button class="btn-main" style="background: rgba(255,255,255,0.05); font-size: 0.8rem; padding: 12px;" onclick="setTheme('matrix')">Эффект: Матрица</button>
            </div>

            <!-- ТОЛЬКО ДЛЯ zl1mbyys -->
            <div id="owner-tools" class="hidden">
                <p style="color: #666; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px;">ВЫДАТЬ АДМИНКУ ПО НИКУ</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="target-nick" placeholder="Никнейм" style="margin:0; padding: 12px; font-size: 0.85rem;">
                    <button class="btn-main" style="margin:0; width: 70px; background: #FF4B4B;" onclick="addAdmin()">OK</button>
                </div>
                
                <p style="color: #666; font-size: 0.7rem; font-weight: 800; margin-top: 30px; margin-bottom: 15px;">СПИСОК АДМИНИСТРАТОРОВ</p>
                <div id="admin-list-container"></div>
            </div>
        </div>

        <button class="btn-main" style="background:rgba(255,0,0,0.1); color:var(--danger); margin-top:60px; border: 1px solid rgba(255,0,0,0.15);" onclick="logout()">Завершить сеанс</button>
        <button class="btn-main" style="background: rgba(255,255,255,0.05); margin-top: 15px;" onclick="toggleMenu()">Закрыть меню</button>
    </div>

    <script>
        const OWNER = 'zl1mbyys';
        const OWNER_P = 'Tema10052014!';

        let state = {
            user: localStorage.getItem('z_user'),
            isAdmin: localStorage.getItem('z_admin') === 'true',
            theme: localStorage.getItem('z_theme') || 'snow'
        };

        // Логика полей при вводе ника
        document.getElementById('login-user').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            const whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            const isOwner = val.toLowerCase() === OWNER;
            const inList = whitelist.includes(val);
            const hasPass = localStorage.getItem('z_pass_' + val);

            document.getElementById('pass-field').classList.toggle('hidden', !((isOwner) || (inList && hasPass)));
            document.getElementById('setup-pass-field').classList.toggle('hidden', !(inList && !hasPass));
        });

        function handleAuth() {
            const nick = document.getElementById('login-user').value.trim();
            const passIn = document.getElementById('login-pass').value;
            const setupP = document.getElementById('setup-new-pass').value;
            const whitelist = JSON.parse(localStorage.getItem('z_whitelist') || '[]');

            if(nick.toLowerCase() === OWNER) {
                if(passIn === OWNER_P) save(nick, true);
                else alert("Неверный пароль владельца!");
            } else if(whitelist.includes(nick)) {
                const savedP = localStorage.getItem('z_pass_' + nick);
                if(!savedP) {
                    if(setupP.length > 3) { localStorage.setItem('z_pass_' + nick, setupP); save(nick, true); }
                    else alert("Пароль должен быть от 4 символов!");
                } else {
                    if(passIn === savedP) save(nick, true);
                    else alert("Неверный пароль администратора!");
                }
            } else if(nick.length > 1) save(nick, false);
        }

        function save(u, a) {
            localStorage.setItem('z_user', u);
            localStorage.setItem('z_admin', a);
            location.reload();
        }

        function addAdmin() {
            const n = document.getElementById('target-nick').value.trim();
            if(!n) return;
            let list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            if(!list.includes(n)) {
                list.push(n);
                localStorage.setItem('z_whitelist', JSON.stringify(list));
                updateAdminList();
                document.getElementById('target-nick').value = '';
            }
        }

        function removeAdmin(nick) {
            let list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            list = list.filter(i => i !== nick);
            localStorage.setItem('z_whitelist', JSON.stringify(list));
            updateAdminList();
        }

        function updateAdminList() {
            const container = document.getElementById('admin-list-container');
            const list = JSON.parse(localStorage.getItem('z_whitelist') || '[]');
            container.innerHTML = list.length ? '' : '<p style="color:#333; font-size:0.8rem; text-align:center;">База данных пуста</p>';
            list.forEach(nick => {
                const div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `<span>${nick}</span><button class="remove-btn" onclick="removeAdmin('${nick}')">УДАЛИТЬ</button>`;
                container.appendChild(div);
            });
        }

        function init() {
            if(!state.user) return;
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-launcher').classList.remove('hidden');
            document.getElementById('profile-hub').classList.remove('hidden');
            document.getElementById('nav-user').innerText = state.user;
            document.getElementById('menu-name').innerText = state.user;

            const badge = document.getElementById('menu-role-badge');
            if(state.user.toLowerCase() === OWNER) {
                badge.innerText = "ВЛАДЕЛЕЦ"; badge.style.background = "rgba(255,75,75,0.15)"; badge.style.color = "#FF4B4B";
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('owner-tools').classList.remove('hidden');
                updateAdminList();
            } else if(state.isAdmin) {
                badge.innerText = "АДМИНИСТРАТОР"; badge.style.background = "rgba(123,97,255,0.15)"; badge.style.color = "#7B61FF";
                document.getElementById('admin-section').classList.remove('hidden');
            }
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function setTheme(t) { localStorage.setItem('z_theme', t); location.reload(); }
        function logout() { localStorage.removeItem('z_user'); localStorage.removeItem('z_admin'); location.reload(); }

        function spawn() {
            const cont = document.getElementById('particles-bg');
            const p = document.createElement('div');
            p.classList.add('snowflake');
            let size = Math.random() * 3 + 1;
            p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.background = state.theme === 'matrix' ? "#00FF41" : "rgba(255,255,255,0.4)";
            if(state.theme === 'matrix') p.style.borderRadius = "0";
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.top = '-10px';
            cont.appendChild(p);
            p.animate([{ transform: 'translateY(0)' }, { transform: `translateY(${window.innerHeight + 20}px)` }], { duration: Math.random() * 4000 + 3000 }).onfinish = () => p.remove();
        }
        setInterval(spawn, 150);
        init();
    </script>
</body>
</html>
