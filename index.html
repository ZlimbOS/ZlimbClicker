<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlimb Private Launcher</title>
    <style>
        @import url('https://googleapis.com');
        
        :root { --accent: #7B61FF; --bg: #0b0d14; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; transition: 0.5s; }
        
        #effect-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 40px; text-align: center; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); z-index: 10; width: 380px; transition: 0.3s; }
        
        h1 { font-size: 2rem; margin: 0 0 20px; background: linear-gradient(45deg, var(--accent), #00A2FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; box-sizing: border-box; outline: none; font-size: 1rem; }
        
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; display: block; margin-top: 10px; font-size: 1rem; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-admin { background: #FF4B4B; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); }
        
        .hidden { display: none; }
        .profile-tag { font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.1); margin-bottom: 15px; display: inline-block; }
        
        .particle { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="effect-container"></div>

    <!-- ОКНО ВХОДА -->
    <div class="card" id="auth-screen">
        <h1>Zlimb OS</h1>
        <input type="text" id="username" placeholder="Введите ваш логин...">
        <button class="btn" onclick="login()">АВТОРИЗАЦИЯ</button>
    </div>

    <!-- ОКНО ПРОФИЛЯ -->
    <div class="card hidden" id="profile-screen">
        <div class="profile-tag" id="user-role">USER</div>
        <h1 id="welcome-name">Username</h1>
        
        <a href="https://yandex.ru" target="_blank" class="btn">СКАЧАТЬ ЛАУНЧЕР</a>
        
        <button id="admin-entry" class="btn btn-admin hidden" onclick="showAdmin()">АДМИН-ПАНЕЛЬ</button>
        <button class="btn btn-outline" onclick="logout()">ВЫЙТИ ИЗ СИСТЕМЫ</button>
    </div>

    <!-- ОКНО АДМИНКИ -->
    <div class="card hidden" id="admin-panel">
        <h1>Admin Control</h1>
        <p style="color: #8F93A3; margin-bottom: 20px;">Настройка визуальных тем</p>
        
        <button class="btn btn-outline" onclick="setTheme('snow')">❄️ СНЕГОПАД</button>
        <button class="btn btn-outline" onclick="setTheme('rain')">💧 ДОЖДЬ</button>
        <button class="btn btn-outline" onclick="setTheme('matrix')">📟 МАТРИЦА</button>
        
        <button class="btn" style="margin-top: 20px;" onclick="showProfile()">ВЕРНУТЬСЯ В ПРОФИЛЬ</button>
    </div>

    <script>
        let currentTheme = localStorage.getItem('zlimb_theme') || 'snow';

        function login() {
            const user = document.getElementById('username').value.trim();
            if(!user) return;
            localStorage.setItem('zlimb_session', user);
            renderApp(user);
        }

        function renderApp(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('profile-screen').classList.remove('hidden');
            
            document.getElementById('welcome-name').innerText = user;

            // ПРОВЕРКА НА АДМИНА
            if(user.toLowerCase() === 'zl1mbyys') {
                document.getElementById('admin-entry').classList.remove('hidden');
                document.getElementById('user-role').innerText = "ADMINISTRATOR";
                document.getElementById('user-role').style.color = "#FF4B4B";
            } else {
                document.getElementById('admin-entry').classList.add('hidden');
                document.getElementById('user-role').innerText = "USER";
                document.getElementById('user-role').style.color = "#7B61FF";
            }
        }

        function showAdmin() {
            document.getElementById('profile-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        function showProfile() {
            renderApp(localStorage.getItem('zlimb_session'));
        }

        function setTheme(type) {
            currentTheme = type;
            localStorage.setItem('zlimb_theme', type);
            location.reload(); // Перезагрузка для применения эффекта
        }

        function logout() {
            localStorage.removeItem('zlimb_session');
            location.reload();
        }

        // ЭФФЕКТЫ (Снег / Дождь / Матрица)
        function spawnParticle() {
            const container = document.getElementById('effect-container');
            const p = document.createElement('div');
            p.classList.add('particle');
            
            let size = Math.random() * 4 + 2;
            let duration = Math.random() * 3000 + 2000;
            let color = "white";

            if(currentTheme === 'rain') {
                size = 1; p.style.width = '1px'; p.style.height = '15px';
                color = "#00A2FF";
            } else if(currentTheme === 'matrix') {
                color = "#00FF41"; size = Math.random() * 10 + 5;
                p.style.borderRadius = "0";
            } else {
                p.style.width = size + 'px'; p.style.height = size + 'px';
            }

            p.style.background = color;
            p.style.left = Math.random() * window.innerWidth + 'px';
            p.style.top = '-20px';
            p.style.opacity = Math.random();
            container.appendChild(p);

            p.animate([
                { transform: 'translateY(0)' },
                { transform: `translateY(${window.innerHeight + 50}px)` }
            ], { duration: duration, easing: 'linear' }).onfinish = () => p.remove();
        }

        // Проверка сессии при входе
        const session = localStorage.getItem('zlimb_session');
        if(session) renderApp(session);
        
        setInterval(spawnParticle, 100);
    </script>
</body>
</html>
